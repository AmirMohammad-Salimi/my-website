DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<title>رزومه امیرمحمد سلیمی</title>

p { color: #c5c5c5; font-size: 1.1em; }
.btn { display: inline-block; padding: 12px 25px; background-color: #e94560; color: white; text-decoration: none; border-radius: 8px; margin-top: 20px; transition: 0.3s; }
</style>
</head>
<body>
<div class="card">
<h1>امیرمحمد سلیمی</h1>
<p>دانشجوی مهندسی کامپیوتر</p>
<p>به وب‌سایت شخصی من خوش آمدید!</p>
<p>این سایت توسط گیت‌هاب میزبانی شده است.</p>
<a href="#" class="btn">ارتباط با من</a>
</div>
</body>
</html>
